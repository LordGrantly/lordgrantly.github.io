<script>

const GITHUB_OWNER = "LordGrantly";
const GITHUB_REPO = "lordgrantly.github.io";
const HIGHSCORE_FILE = "highscores.json";
const GITHUB_API_URL = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${HIGHSCORE_FILE}`;

let turn = 0;
const Points_Display = document.getElementById("Points");
const Shop_Button = document.getElementById("Shop_Button");
const preview = document.getElementById("preview"); 
const Turns_Display = document.getElementById("pe");
const You = document.getElementById("You");
const End_Button = document.getElementById("End_Button");
const square = document.getElementById("square");

let dpr = 1;
let cameraX = 0;
let cameraY = 0;
let touchStartX = 0;
let touchStartY = 0;
let VIEWPORT_WIDTH = 0;
let VIEWPORT_HEIGHT = 0;
let bonus_spawned = false;
let bonus_chance = 10;
let Enemy_step = 160;
let Max_turns = 2;
let Turns = 2;
let canvas, ctx;
let enemy_Type = "normal";
let enemy_cost = 1;
let enemy_Max_points = 2;
let enemy_points = 2;
let mode = "moving";
let fast_chance = 20;
let slow_chance = 40; //20 + 20
let bigger_chance = 50; //20 + 20 + 10
let range = 200;
let true_range = range ;
let frosen = false;
let playerPoints = 10;
let PointsInc = 1;
let state = "playing";
let endTurnEnabled = false;
let Enemy_scaling = 5;
let bonus_type = "money";
let money_bonus_chance = 65;
let reset_turns_bonus_chance = 90;
let discount_bonus_chance = 100;
let highscore = 0;
let discount_Turns_Left = 0;
    const HIGH_SCORE_URL = "https://alpha-highscore.wincenty-myjak.workers.dev";
let highscoreRequestId = 0;

async function updateHighscore(){
    if (turn > highscore) {
        highscore = turn;
        Turns_Display.textContent = "Turn: " + turn + " | Highscore: " + highscore;
    }

    const requestId = ++highscoreRequestId;

    try{
        const response = await fetch(HIGH_SCORE_URL,{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({ score: turn })
        });

        const data = await response.json();
        console.log(data);

   
        if (requestId !== highscoreRequestId) return;

        if (data.bestTurn && data.bestTurn > highscore) {
            highscore = data.bestTurn;
        }

        Turns_Display.textContent =
            "Turn: " + turn + " | Highscore: " + highscore;

    }catch(error){
        console.log("Highscore error:",error);
    }
}


async function getHighscore(){

    try{

        const response = await fetch(HIGH_SCORE_URL);

        const data = await response.json();

        highscore = data.bestTurn;


        Turns_Display.textContent =
            "Turn: " + turn + " | Highscore: " + highscore;


    }catch(error){

        console.log("Could not load highscore",error);

    }
}
async function submitHighscore(score){

    try {

        const response = await fetch(HIGH_SCORE_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                score:score
            })
        });


        const data = await response.json();

        console.log("Highscore response:", data);

    } catch(error){

        console.log("Highscore error:", error);

    }

}




    const turnsDisplay = document.createElement("h2");
    turnsDisplay.style.position = "absolute";
    turnsDisplay.style.left = "10px";
    turnsDisplay.style.top = "0px";
    document.body.appendChild(turnsDisplay);
const offerings = [
    { name: `Bonus Chance (${bonus_chance}% ---> ${bonus_chance + 10}%)`,cost: 10,multi: 2,effect: () => { bonus_chance += 10; },name_change: () => `Bonus Chance (${bonus_chance}% ---> ${bonus_chance + 10}%)`},
    { name: `More income (${PointsInc} ---> ${PointsInc + 1})`,cost: 20,multi: 1.5,effect: () => { PointsInc += 1; },name_change: () => `More income (${PointsInc} ---> ${PointsInc + 1})`},
    { name: `Max Turns (${Max_turns } ---> ${Max_turns+1})`, cost: 40, multi: 3, effect: () => { Max_turns += 1; Turns += 1; }, name_change: () => `Max Turns (${Max_turns } ---> ${Max_turns+1})` },
    { name: `Stronger Player (${true_range} ---> ${true_range + 35})`, cost: 10, multi: 1.5, effect: () => { true_range += 35; range += 35; }, name_change: () => `Stronger Player (${true_range} ---> ${true_range + 35})`},
    { name: `Extra Turn`, cost: 10, multi: 1.1, effect: () => { Turns += 1; } ,name_change: () => `Extra Turn`},
    { name: `Weaker Enemies (${Enemy_step} ---> ${Enemy_step - 50})`, cost: 10, multi: 2, effect: () => { Enemy_step -= 50; }, name_change: ()  => `Weaker Enemies (${Enemy_step} ---> ${Enemy_step - 50})`},
    { name: `Less Enemies (${Math.floor(enemy_Max_points)} ---> ${Math.floor(enemy_Max_points - 1)})`, cost: 20, multi: 2, effect: () => { enemy_Max_points -= 1; } , name_change: () => `Less Enemies (${Math.floor(enemy_Max_points)} ---> ${Math.floor(enemy_Max_points - 1)})`},
];
const slower_areas = [];
const Bonuses =[];
const crosses = [];

const enemies = [];
const lifetime = 5;
End_Button.addEventListener('click', () => {
    if (state !== "playing" || !endTurnEnabled) return;
    End_Turn();
});



function updateEndButtonState() {
    if (endTurnEnabled) {
        End_Button.style.opacity = '1';
        End_Button.style.pointerEvents = 'auto';
    } else {
        End_Button.style.opacity = '0.1';
        End_Button.style.pointerEvents = 'none';
    }
}

function clampPlayerPosition(x, y) {
    const playerWidth = You.offsetWidth;
    const playerHeight = You.offsetHeight;
    const minX = 0;
    const minY = 0;
    const maxX = WORLD_WIDTH - playerWidth;
    const maxY = WORLD_HEIGHT - playerHeight;
    return {
        x: Math.min(Math.max(x, minX), maxX),
        y: Math.min(Math.max(y, minY), maxY)
    };
}

function clampPreviewPosition(x, y) {
    const previewWidth = preview.offsetWidth;
    const previewHeight = preview.offsetHeight;
    const minX = 0;
    const minY = 0;
    const maxX = Math.max(0, VIEWPORT_WIDTH - previewWidth);
    const maxY = Math.max(0, VIEWPORT_HEIGHT - previewHeight);
    return {
        x: Math.min(Math.max(x, minX), maxX),
        y: Math.min(Math.max(y, minY), maxY)
    };
}

function isColliding(a, b) {
    return !(
        a.right < b.left ||
        a.left > b.right ||
        a.bottom < b.top ||
        a.top > b.bottom 
    );
}
function device_check() {
    if (/Mobi|Android/i.test(navigator.userAgent)) {
        
        user = "phone";
        Enemy_scaling = 2;
        Enemy_step = 70;
        offerings[5].effect = () => { Enemy_step -= 30; };
        offerings[5].name_change = () => `Weaker Enemies (${Enemy_step} ---> ${Enemy_step - 30})`;
        offerings[5].name = `Weaker Enemies (${Enemy_step} ---> ${Enemy_step - 30})`;
        Shop_Button.style.width = "100px";
        Shop_Button.style.height = "40px";
        End_Button.style.bottom = "74px";
        Turns_Display.style.left = "20%";
    }else{
        
        user = "pc";
        
    }
}
function setCanvas() {
    canvas = document.getElementById("mycanvas");
    
    ctx = canvas.getContext("2d");
    VIEWPORT_WIDTH = window.innerWidth;
    VIEWPORT_HEIGHT = window.innerHeight;
    
   
        WORLD_WIDTH = window.innerWidth;
        WORLD_HEIGHT = window.innerHeight;
    
}
function resizeCanvas() {
    VIEWPORT_WIDTH = window.innerWidth;
    VIEWPORT_HEIGHT = window.innerHeight;
    
    
        WORLD_WIDTH = window.innerWidth;
        WORLD_HEIGHT = window.innerHeight;
    

   
    const canvasWidth = user === "phone" ? VIEWPORT_WIDTH : WORLD_WIDTH;
    const canvasHeight = user === "phone" ? VIEWPORT_HEIGHT : WORLD_HEIGHT;

    canvas.style.width = canvasWidth + "px";
    canvas.style.height = canvasHeight + "px";

    canvas.width = canvasWidth;
    canvas.height = canvasHeight;

    ctx.setTransform(1, 0, 0, 1, 0, 0);
}
Shop_Button.addEventListener("click", function () {
    if (state !== "playing") return; 

    if (mode === "moving") {
        Points_Display.textContent = "Points: " + playerPoints  ;
        mode = "shop"; 
        Shop_Offerings.style.display = "flex";
        updateShop(); 
    } else if (mode === "shop") {
        Points_Display.textContent = "Points: " + playerPoints  ;
        square.style.width = range + "px";
        square.style.height = range + "px";  
        mode = "moving"; 
        Shop_Offerings.style.display = "none";
    }
});

function updateShop() {
 
    Shop_Offerings.innerHTML = "";

    const header = document.createElement("div");
    header.id = "Shop_Offerings_Header";

    const title = document.createElement("h2");
    
    title.textContent = "Points: " + playerPoints  ;

   
    const toggleContainer = document.createElement('div');
    toggleContainer.style.display = 'flex';
    toggleContainer.style.flexDirection = 'column';
    toggleContainer.style.gap = '8px';
    toggleContainer.style.marginBottom = '12px';

    const toggleLabel = document.createElement('div');
    toggleLabel.textContent = 'Main End Turn Button:';
    toggleLabel.style.color = 'white';
    toggleLabel.style.fontSize = '16px';
    toggleLabel.style.fontWeight = 'bold';

    const toggleButton = document.createElement('button');
    toggleButton.textContent = endTurnEnabled ? 'Disable End Turn' : 'Enable End Turn';
    toggleButton.style.padding = '10px';
    toggleButton.style.background = '#3d7a20';
    toggleButton.style.color = 'white';
    toggleButton.style.border = '2px solid #111';
    toggleButton.style.borderRadius = '12px';
    toggleButton.style.cursor = 'pointer';
    toggleButton.style.fontSize = '14px';
    toggleButton.style.fontWeight = 'bold';

    toggleButton.addEventListener('click', () => {
        endTurnEnabled = !endTurnEnabled;
        toggleButton.textContent = endTurnEnabled ? 'Disable End Turn' : 'Enable End Turn';
        updateEndButtonState();
    });

    toggleContainer.appendChild(toggleLabel);
    toggleContainer.appendChild(toggleButton);
    header.appendChild(toggleContainer);
    header.appendChild(title);
    Shop_Offerings.appendChild(header);

    const list = document.createElement("div");
    list.id = "Shop_Offerings_List";

    offerings.forEach(offering => {
        const div = document.createElement("div");
        
        div.innerHTML = `${offering.name_change ? offering.name_change() : offering.name} 
            (<b><font color=green>${offering.cost}</font></b> points)`;
        div.style.cursor = "pointer";
        div.style.padding = "10px";
        div.style.marginBottom = "10px";
        div.style.borderRadius = "20px";
        div.style.background = "rgba(255,255,255,0.08)";
        div.style.border = "1px solid rgba(255,255,255,0.1)";
        div.style.transition = "0.15s";
        div.style.fontWeight = "bold";
        
        div.addEventListener("mouseenter", () => {
    div.style.background = "rgba(255,255,255,0.18)";
});

div.addEventListener("mouseleave", () => {
    div.style.background = "rgba(255,255,255,0.08)";
});

        div.addEventListener("click", () => {
            
            if (playerPoints >= offering.cost) {
                offering.effect(); 
                offering.name = offering.name_change();
                playerPoints -= offering.cost;
                Points_Display.textContent = "Points: " + playerPoints  ;
                offering.cost = Math.floor(offering.cost * offering.multi);
                div.textContent = `${offering.name} (${offering.cost} points)`;
                title.textContent = "Points: " + playerPoints  ;
                updateShop();
            }
        });

        list.appendChild(div);
    });

    Shop_Offerings.appendChild(list);

}

function createBonusElement(color) {

const div = document.createElement("div");

div.style.position = "absolute";
div.style.width = "30px";
div.style.height = "30px";
div.style.backgroundColor = color;
div.style.border = "5px solid black";


div.style.color = "pink";



document.body.appendChild(div);

return div;

}
function End_Turn() {
    if (state !== "playing") return;
    frosen = false;
    state = "waiting";
    square.style.backgroundColor = "rgba(0,0,100,0.6)";
    preview.style.display = "none";
    turn += 1;
    discount_Turns_Left --;
    if (discount_Turns_Left === 0 || discount_Turns_Left > 0) {
        offerings.forEach(offering => {
            offering.cost = Math.floor(offering.cost / 0.8);
            offering.name = offering.name_change();
        
    });}else(
        offerings.forEach(offering => {
            
            
                offering.name = offering.name_change();
            
        
    })
    )

    updateHighscore();
    playerPoints += PointsInc;
    enemy_points = Math.floor(enemy_Max_points);
    enemy_Max_points += 0.1;
    bonus_spawned = false;
    Points_Display.textContent = "Points: " + playerPoints;
    Turns_Display.textContent ="Turn: " + turn + " | Highscore: " + highscore;
    crosses.forEach(cross => {
        
        cross.clicked += 1;
        
        
    });
    Bonuses.forEach(bonus => {
        bonus.created += 1;
    });
    square.style.backgroundColor = "rgba(0,0,100,0.6)";
    Turns = Max_turns;
    
    enemies.forEach(enemy => {
    enemy.startX = enemy.x;
    enemy.startY = enemy.y;

    let dy = You.offsetTop - enemy.y;
    let dx = You.offsetLeft - enemy.x;


    let moveX = 0;
    let moveY = 0;
    let stepBase = Enemy_step;

let step = enemy.type === "fast"    ? stepBase * 1.5: stepBase;

if (Math.abs(dx) > Math.abs(dy)) {
    let move = Math.min(Math.abs(dx), step);
    moveX = dx > 0 ? move : -move;
} else {
    let move = Math.min(Math.abs(dy), step);
    moveY = dy > 0 ? move : -move;
}

enemy.targetX = enemy.x + moveX;
enemy.targetY = enemy.y + moveY;

    enemy.progress = 0;
});

        
    
    
    const youRect = You.getBoundingClientRect();
    enemies.forEach(enemy => {
        
    
       
        
        const enemyRect = enemy.element.getBoundingClientRect();
        if (isColliding(youRect, enemyRect)) {
            state = "gameover";
            
            submitHighscore(turn);
            setTimeout(() => {
                location.reload();
            
        }, 5000);
            
        }
        
    });
   
    
    let form = Math.random()*100 < bonus_chance ? "bonus" : "enemy";
    if (form === "bonus" && !bonus_spawned) {
    bonus_spawned = true;
    if (  Math.random() * 100 < money_bonus_chance) bonus_type = "money";
    else if (Math.random() * 100 < reset_turns_bonus_chance) bonus_type = "reset_turns";
    else if (Math.random() * 100 < discount_bonus_chance) bonus_type = "discount";
        
    if (bonus_type === "discount") {
        
    Bonuses.push({
     x :Math.random() * (WORLD_WIDTH - 30),
     y : Math.random() * (WORLD_HEIGHT - 30),
    effect: () => offerings.forEach(offering => {
        discount_Turns_Left ++;
        if (discount_Turns_Left > 1) return;
        offering.cost = Math.floor(offering.cost * 0.8);
        offering.name = offering.name_change();
        
    }),
    
    element: createBonusElement("gold"),
    color: "gold",
    type: "discount"
    
});  
}else  if (bonus_type === "money") {
    Bonuses.push({
     x :Math.random() * (WORLD_WIDTH - 30),
     y : Math.random() * (WORLD_HEIGHT - 30),
    effect: () => { playerPoints += PointsInc * 2 + Math.floor(Math.random() * 3) + 1; },
    amount: PointsInc * 2 + Math.floor(Math.random() * 3) + 1,
    element: createBonusElement("pink"),
    color: "pink",
    type: "money"
    
}); 
}
else if (bonus_type === "reset_turns" ) {
        
        Bonuses.push({
            x: Math.random() * (WORLD_WIDTH - 30),
            y: Math.random() * (WORLD_HEIGHT - 30),
            created: 0,
            effect: () => { Turns = Max_turns; },
            element: createBonusElement("blue"),
            color: "blue",
            type: "reset_turns"
        });
    }
        
    }
    
    
   
Bonuses.forEach(bonus => {
        
        const bonusRect = bonus.element.getBoundingClientRect(); 
if (isColliding(youRect, bonusRect)) {
            bonus.element.remove();
            bonus.effect();
            
            const div = document.createElement("div");
            document.body.appendChild(div);
            div.style.position = "absolute";
            div.style.left = bonusRect.left + "px";
            div.style.top = (bonusRect.top- 40) + "px";
            
            div.style.fontSize = "40px";
            div.style.fontWeight = "bold";
            div.style.color = bonus.color;
            if (bonus.type === "money") div.textContent = "+" + bonus.amount;
            else if (bonus.type === "reset_turns") div.textContent = "Turns Reset!";
            setTimeout(() => {
                div.remove();
            }, 1000);
            Points_Display.textContent = "Points: " + playerPoints;
        
            
            
            Bonuses.splice(Bonuses.indexOf(bonus), 1);
        }});



            Points_Display.textContent = "Points: " + playerPoints;
            let safe = 100000;
    while (enemy_points > 0 && safe-- > 0 ) {
    let form = "enemy"; 


let Enemy_Type = "normal";
let cost = 1;


    let Randomize_Enemy_Type = Math.random() * 100;
    Enemy_Type = Randomize_Enemy_Type < fast_chance  && Enemy_Type === "normal"? "fast" : Enemy_Type;
    Enemy_Type = Randomize_Enemy_Type < slow_chance && Enemy_Type === "normal"? "slower" : Enemy_Type;
    Enemy_Type = Randomize_Enemy_Type < bigger_chance && Enemy_Type === "normal"  ? "bigger" : Enemy_Type;

    if (Enemy_Type === "slower" || Enemy_Type === "bigger") {
        cost = 3;
        
    } else{
    cost = (Enemy_Type === "fast") ? 2 : 1;
    }
    if (enemy_points < cost) {
        Enemy_Type = "normal";
        cost = 1;
    }

    enemy_points -= cost;
    addCross(Enemy_Type, form);
    }
    Enemy_step += Enemy_scaling;
    offerings.forEach(offering => {

        offering.name = offering.name_change();
        
    });
    updateShop();
    

            
           
        };
        
    document.addEventListener("keydown", (event) => {

});

 const x = Math.random() * (WORLD_WIDTH - 32);

        y,

preview.addEventListener("click", (event) => {

    }else {
        range = true_range;
    }

    square.style.height = range + "px";

    const pH = You.offsetHeight;
    const sqW = square.offsetWidth;
    const sqH = square.offsetHeight;
    square.style.left = (clamped.x - sqW/2 + pW/2 - cameraX) + "px";
    square.style.top = (clamped.y - sqH/2 + pH/2 - cameraY) + "px";
    

    if (user === "phone") {
        const centerX = clamped.x - VIEWPORT_WIDTH / 2;
        const centerY = clamped.y - VIEWPORT_HEIGHT / 2;

     const youRect = You.getBoundingClientRect();

                ctx.strokeStyle = "yellow";
                    size = 20;
            }else if (cross.type === "slower") {

            }else {

            ctx.beginPath();
            ctx.moveTo(cross.x - cameraX, cross.y - cameraY);
            ctx.lineTo(cross.x + size - cameraX, cross.y + size - cameraY);
